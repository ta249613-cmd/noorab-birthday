<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Website</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin: 0; padding: 1rem; color: #222; }
    header { display:flex; align-items:center; gap:1rem; margin-bottom:1rem; }
    header img { width:80px; height:80px; object-fit:cover; border-radius:8px; }
    .gallery { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .gallery img { width:120px; height:80px; object-fit:cover; border-radius:6px; }
    .controls { margin-bottom:1rem; }
    button { padding:0.5rem 0.75rem; border-radius:6px; border:1px solid #ccc; background:#f5f5f5; cursor:pointer; }
    /* Modal styles */
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000; }
    .modal[aria-hidden="false"] { display:flex; }
    .modal-content { background:#fff; padding:1.25rem; border-radius:8px; max-width:600px; width:90%; box-shadow:0 8px 24px rgba(0,0,0,0.2); position:relative; }
    .modal-close { position:absolute; top:0.5rem; right:0.5rem; background:transparent; border:none; font-size:1.1rem; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <img id="profileImg" src="profile.jpg" alt="Profile" />
    <div>
      <h1>Welcome</h1>
      <p>Hi — this site uses files from the repository root (profile.jpg, 1.jpg–5.jpg, birthday.mp3).</p>
    </div>
  </header>

  <section class="gallery" aria-label="Photo gallery">
    <img src="1.jpg" alt="Photo 1" />
    <img src="2.jpg" alt="Photo 2" />
    <img src="3.jpg" alt="Photo 3" />
    <img src="4.jpg" alt="Photo 4" />
    <img src="5.jpg" alt="Photo 5" />
  </section>

  <section class="controls" aria-label="Music player">
    <audio id="birthday" src="birthday.mp3" preload="none"></audio>
    <button id="playMusic" type="button">Play Birthday Song</button>
  </section>

  <section>
    <button id="loveLetterBtn" type="button">Open Love Letter</button>
  </section>

  <!-- Love letter modal (hidden by default) -->
  <div id="loveModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="loveTitle">
    <div class="modal-content">
      <button id="closeLove" class="modal-close" aria-label="Close love letter">&times;</button>
      <h2 id="loveTitle">A Love Letter</h2>
      <div id="loveBody">
        <p>Dear you,</p>
        <p>This is a little love letter — generated by the site. You can close this message with the Close button or by clicking the dimmed area.</p>
        <p>With affection,</p>
        <p>Your Website</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
